services:
  - type: web
    name: linkedin-automation-backend
    env: python
    region: oregon
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 300"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "/opt/render/project/.cache/ms-playwright"
    autoDeploy: true
